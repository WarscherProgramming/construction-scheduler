
services:
  - type: web
    name: construction-scheduler-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://construction-scheduler-eight.vercel.app
